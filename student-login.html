<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    margin: 0;
}

.login-wrapper {
    display: flex;
    width: 100%;
    max-width: 1200px;
    min-height: 100vh;
    background: white;
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.1);
}

.image-section {
    flex: 1;
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%),
                url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=800&q=80') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    position: relative;
    overflow: hidden;
}

.image-section::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="80" cy="40" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="40" cy="80" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="70" cy="70" r="2" fill="rgba(255,255,255,0.3)"/></svg>');
    animation: float 20s linear infinite;
}

@keyframes float {
    0% { background-position: 0 0; }
    100% { background-position: 100px 100px; }
}

.image-content {
    text-align: center;
    color: white;
    z-index: 1;
}

.image-content h1 {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 20px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}

.image-content p {
    font-size: 20px;
    line-height: 1.6;
    opacity: 0.95;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
}

.form-section {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
}

@media (max-width: 968px) {
    .login-wrapper {
        flex-direction: column;
    }
    
    .image-section {
        min-height: 300px;
        padding: 40px 20px;
    }
    
    .image-content h1 {
        font-size: 32px;
    }
    
    .image-content p {
        font-size: 16px;
    }
}

.container {
    width: 100%;
    max-width: 450px;
    padding: 20px;
    animation: slideIn 0.5s ease-out;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.login-header {
    text-align: center;
    margin-bottom: 35px;
}

.login-icon {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    position: relative;
    animation: pulse 2s ease-in-out infinite;
}

.login-icon::before {
    content: '';
    position: absolute;
    width: 120px;
    height: 120px;
    border: 3px solid rgba(102, 126, 234, 0.3);
    border-radius: 50%;
    animation: ripple 2s ease-out infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

@keyframes ripple {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.3); opacity: 0; }
}

.login-icon svg {
    width: 50px;
    height: 50px;
    fill: white;
}

h2 {
    color: #333;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
}

.subtitle {
    color: #666;
    font-size: 14px;
}

.input-group {
    position: relative;
    margin-bottom: 25px;
}

.input-group label {
    display: block;
    color: #555;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    text-align: left;
}

.input-group input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    transition: all 0.3s ease;
    background: #f8f9fa;
}

.input-group input:focus {
    outline: none;
    border-color: #667eea;
    background: white;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
}

.input-group input::placeholder {
    color: #aaa;
}

/* Remove browser autofill styling */
.input-group input:-webkit-autofill,
.input-group input:-webkit-autofill:hover,
.input-group input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 1000px #f8f9fa inset;
    box-shadow: 0 0 0 1000px #f8f9fa inset;
    -webkit-text-fill-color: #333;
}

/* Hide any browser-generated forgot password links */
.input-group input::-webkit-credentials-auto-fill-button {
    visibility: hidden;
    display: none;
    pointer-events: none;
}

.input-group input::-ms-reveal,
.input-group input::-ms-clear {
    display: none;
}

button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
}

button:active {
    transform: translateY(0);
}

button:disabled {
    background: #ccc;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

#message {
    margin-top: 20px;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    display: none;
}

#message.show {
    display: block;
}

#message.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

#message.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

.forgot-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #667eea;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.3s ease;
}

.forgot-link:hover {
    color: #764ba2;
    text-decoration: underline;
}

.divider {
    text-align: center;
    margin: 25px 0;
    position: relative;
}

.divider::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    width: 100%;
    height: 1px;
    background: #e0e0e0;
}

.divider span {
    background: white;
    padding: 0 15px;
    position: relative;
    color: #999;
    font-size: 13px;
}

.back-home {
    text-align: center;
    margin-top: 20px;
}

.back-home a {
    color: #667eea;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.3s ease;
}

.back-home a:hover {
    color: #764ba2;
}

.otp-login-btn {
    background: white;
    color: #667eea;
    border: 2px solid #667eea;
    box-shadow: none;
    margin-top: 15px;
}

.otp-login-btn:hover {
    background: #667eea;
    color: white;
}

.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.modal-content {
    background-color: white;
    margin: 10% auto;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 450px;
    position: relative;
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    line-height: 20px;
}

.close:hover {
    color: #000;
}

.modal-content h3 {
    color: #333;
    margin-bottom: 20px;
    font-size: 24px;
}

.modal-content p {
    color: #666;
    margin-bottom: 20px;
}

.secondary-btn {
    background: #6c757d;
    margin-top: 10px;
}

.secondary-btn:hover {
    background: #5a6268;
}

#otpMessage {
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    text-align: center;
    display: none;
}

#otpMessage.show {
    display: block;
}

#otpMessage.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

#otpMessage.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}
</style>
</head>

<body>

<div class="login-wrapper">
<div class="image-section">
<div class="image-content">
<h1>Welcome Students!</h1>
<p>Access your courses, submit feedback, and track your academic progress all in one place.</p>
</div>
</div>

<div class="form-section">
<div class="container">
<div class="login-header">
<div class="login-icon">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
</svg>
</div>
<h2>Student Login</h2>
<p class="subtitle">Welcome back! Please login to your account</p>
</div>

<form id="loginForm">
<div class="input-group">
<label for="student_id">Student ID</label>
<input type="text" id="student_id" placeholder="Enter your student ID" required>
</div>

<div class="input-group">
<label for="password">Password</label>
<input type="password" id="password" placeholder="Enter your password" required>
</div>

<button type="submit" id="loginBtn">Login</button>
</form>

<div id="message"></div>

<a href="student-forgot.html" class="forgot-link">Forgot Password?</a>

<div class="divider">
<span>OR</span>
</div>

<button type="button" id="otpLoginBtn" class="otp-login-btn">Login with OTP</button>

<div class="back-home">
<a href="index.html">← Back to Home</a>
</div>

<!-- OTP Login Modal -->
<div id="otpModal" class="modal">
<div class="modal-content">
<span class="close">&times;</span>
<h3>Login with OTP</h3>
<div id="otpStep1">
<p>Enter your registered email address</p>
<div class="input-group">
<label for="otp_email">Email Address</label>
<input type="email" id="otp_email" placeholder="Enter your email" required>
</div>
<button type="button" id="sendOtpBtn">Send OTP</button>
</div>
<div id="otpStep2" style="display: none;">
<p>Enter the OTP sent to your email</p>
<div class="input-group">
<label for="otp_code">OTP Code</label>
<input type="text" id="otp_code" placeholder="Enter 6-digit OTP" maxlength="6" required>
</div>
<button type="button" id="verifyOtpBtn">Verify & Login</button>
<button type="button" id="resendOtpBtn" class="secondary-btn">Resend OTP</button>
</div>
<div id="otpMessage"></div>
</div>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="supabase.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const student_id = document.getElementById('student_id').value.trim();
    const password   = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');
    const loginBtn   = document.getElementById('loginBtn');
    loginBtn.disabled = true; loginBtn.textContent = 'Logging in...';

    const hashed = await hashPassword(password);
    const { data, error } = await db.from('students').select('*').eq('student_id', student_id).eq('password', hashed).single();

    if(error || !data){ messageDiv.className='message error show'; messageDiv.textContent='✗ Invalid Student ID or Password'; loginBtn.disabled=false; loginBtn.textContent='Login'; return; }
    if(data.is_active != true){ messageDiv.className='message error show'; messageDiv.textContent='✗ Account inactive'; loginBtn.disabled=false; loginBtn.textContent='Login'; return; }

    setSession('student', { student_id: data.student_id, name: data.name, email: data.email, dept_id: data.dept_id, semester: data.semester });
    messageDiv.className='message success show'; messageDiv.textContent='✓ Login successful';
    setTimeout(() => window.location.href='student-dashboard.html', 500);
});

const modal = document.getElementById('otpModal');
const otpMessage = document.getElementById('otpMessage');
document.getElementById('otpLoginBtn').onclick = () => { modal.style.display='block'; document.getElementById('otpStep1').style.display='block'; document.getElementById('otpStep2').style.display='none'; };
document.getElementsByClassName('close')[0].onclick = () => modal.style.display='none';
window.onclick = e => { if(e.target==modal) modal.style.display='none'; };

document.getElementById('sendOtpBtn').onclick = async function() {
    const email = document.getElementById('otp_email').value.trim();
    if(!email) return;
    this.disabled=true; this.textContent='Sending...';
    const { data } = await db.from('students').select('student_id').eq('email', email).single();
    if(!data){ otpMessage.className='error show'; otpMessage.textContent='✗ Email not found'; this.disabled=false; this.textContent='Send OTP'; return; }
    const otp = Math.floor(100000+Math.random()*900000).toString();
    const expires = new Date(Date.now()+10*60*1000).toISOString();
    await db.from('password_reset_tokens').insert([{user_id:data.student_id,user_type:'student',token:otp,expires_at:expires}]);
    try { await sendOTPEmail(email, otp); } catch(e) { console.error('Email error:', e); }
    otpMessage.className='success show'; otpMessage.textContent='✓ OTP sent to your email';
    document.getElementById('otpStep1').style.display='none'; document.getElementById('otpStep2').style.display='block';
    this.disabled=false; this.textContent='Send OTP';
};

document.getElementById('verifyOtpBtn').onclick = async function() {
    const otp = document.getElementById('otp_code').value.trim();
    if(!otp||otp.length!==6) return;
    this.disabled=true; this.textContent='Verifying...';
    const now = new Date().toISOString();
    const { data } = await db.from('password_reset_tokens').select('user_id').eq('token',otp).eq('user_type','student').gte('expires_at',now).single();
    if(!data){ otpMessage.className='error show'; otpMessage.textContent='✗ Invalid or expired OTP'; this.disabled=false; this.textContent='Verify & Login'; return; }
    const { data: student } = await db.from('students').select('*').eq('student_id',data.user_id).single();
    await db.from('password_reset_tokens').delete().eq('token',otp);
    setSession('student',{student_id:student.student_id,name:student.name,email:student.email,dept_id:student.dept_id,semester:student.semester});
    otpMessage.className='success show'; otpMessage.textContent='✓ Login successful';
    setTimeout(()=>window.location.href='student-dashboard.html',500);
};

document.getElementById('resendOtpBtn').onclick = () => { document.getElementById('otpStep1').style.display='block'; document.getElementById('otpStep2').style.display='none'; document.getElementById('otp_code').value=''; };
</script>

</body>
</html>
