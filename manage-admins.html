<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Admins</title>
<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.navbar{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
position:relative;
}

.back-btn{
position:absolute;
left:20px;
top:12px;
background:#3498db;
color:white;
padding:8px 15px;
border-radius:5px;
text-decoration:none;
font-size:14px;
}

.container{
max-width:1200px;
margin:40px auto;
padding:20px;
}

.add-section{
background:white;
padding:30px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.add-section h2{
margin-top:0;
color:#2c3e50;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
margin-bottom:5px;
color:#555;
font-weight:bold;
}

.form-group input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:5px;
font-size:14px;
box-sizing:border-box;
}

.btn{
background:#27ae60;
color:white;
padding:12px 30px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

.btn:hover{
background:#229954;
}

.admin-list{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.admin-list h2{
margin-top:0;
color:#2c3e50;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th{
background:#34495e;
color:white;
padding:12px;
text-align:left;
}

table td{
padding:12px;
border-bottom:1px solid #ddd;
}

table tr:hover{
background:#f8f9fa;
}

.delete-btn{
background:#e74c3c;
color:white;
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
font-size:12px;
}

.delete-btn:hover{
background:#c0392b;
}

.status-active{
color:#27ae60;
font-weight:bold;
}

.status-inactive{
color:#e74c3c;
font-weight:bold;
}

.message{
padding:15px;
margin-bottom:20px;
border-radius:5px;
display:none;
}

.success{
background:#d4edda;
color:#155724;
border:1px solid #c3e6cb;
}

.error{
background:#f8d7da;
color:#721c24;
border:1px solid #f5c6cb;
}
</style>
</head>
<body>

<div class="navbar">
Manage Admins
<a href="admin-dashboard.html" class="back-btn">← Back to Dashboard</a>
</div>

<div class="container">

<div id="message" class="message"></div>

<!-- Add Admin Section -->
<div class="add-section">
<h2>Add New Admin</h2>
<form id="addAdminForm">
<div class="form-group">
<label>Admin ID:</label>
<input type="text" id="admin_id" required placeholder="e.g., admin2">
</div>
<div class="form-group">
<label>Name:</label>
<input type="text" id="name" required placeholder="e.g., John Smith">
</div>
<div class="form-group">
<label>Email:</label>
<input type="email" id="email" required placeholder="e.g., admin@bvrit.ac.in">
</div>
<div class="form-group">
<label>Phone:</label>
<input type="text" id="phone" required placeholder="10 digit number">
</div>
<div class="form-group">
<label>Password:</label>
<input type="password" id="password" required placeholder="Min 6 chars, uppercase, lowercase, special char">
</div>
<button type="submit" class="btn">Add Admin</button>
</form>
</div>

<!-- Admin List Section -->
<div class="admin-list">
<h2>All Admins</h2>
<table id="adminTable">
<thead>
<tr>
<th>Admin ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Status</th>
<th>Created At</th>
<th>Action</th>
</tr>
</thead>
<tbody id="adminTableBody">
<tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
</tbody>
</table>
</div>

</div>

<!-- Edit Admin Modal -->
<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
<div style="background:white; width:500px; margin:50px auto; padding:30px; border-radius:10px; max-height:90vh; overflow-y:auto;">
<h2>Edit Admin</h2>
<form id="editAdminForm">
<input type="hidden" id="edit_admin_id">
<div class="form-group">
<label>Name:</label>
<input type="text" id="edit_name" required>
</div>
<div class="form-group">
<label>Email:</label>
<input type="email" id="edit_email" required>
</div>
<div class="form-group">
<label>Phone:</label>
<input type="text" id="edit_phone" required>
</div>
<div class="form-group">
<label>New Password (leave empty to keep current):</label>
<input type="password" id="edit_password" placeholder="Optional">
</div>
<button type="submit" class="btn">Update Admin</button>
<button type="button" class="btn" style="background:#95a5a6; margin-left:10px;" onclick="closeEditModal()">Cancel</button>
</form>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>

window.onload = function(){ loadAdmins(); };

// Add Admin
document.getElementById('addAdminForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const admin_id = document.getElementById('admin_id').value.trim();
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;

    if(!validateEmail(email)) return showMessage('Email must be @bvrit.ac.in', 'error');
    if(!validatePhone(phone)) return showMessage('Phone must be 10 digits', 'error');
    if(!validatePassword(password)) return showMessage('Password must be 6+ chars with uppercase, lowercase & special char', 'error');
    if(!/^[a-zA-Z\s]+$/.test(name)) return showMessage('Name must contain only letters and spaces', 'error');

    const hashed = await hashPassword(password);

    const { error } = await db.from('admin').insert([{ admin_id, name, email, phone, password: hashed, is_active: true }]);
    if(error){
        showMessage(error.message.includes('duplicate') ? 'Admin ID or Email already exists' : error.message, 'error');
    } else {
        showMessage('Admin added successfully', 'success');
        document.getElementById('addAdminForm').reset();
        loadAdmins();
    }
});

// Load all admins
async function loadAdmins(){
    const { data, error } = await db.from('admin').select('admin_id, name, email, phone, is_active, created_at').order('created_at', { ascending: false });
    if(error){
        document.getElementById('adminTableBody').innerHTML = '<tr><td colspan="7" style="text-align:center;">Error loading admins</td></tr>';
    } else {
        displayAdmins(data);
    }
}

function displayAdmins(admins){
    const tbody = document.getElementById('adminTableBody');
    if(!admins || admins.length === 0){
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No admins found</td></tr>';
        return;
    }
    tbody.innerHTML = '';
    admins.forEach(admin => {
        const row = document.createElement('tr');
        const statusClass = admin.is_active ? 'status-active' : 'status-inactive';
        const statusText  = admin.is_active ? 'Active' : 'Inactive';
        row.innerHTML = `
            <td>${admin.admin_id}</td>
            <td>${admin.name}</td>
            <td>${admin.email}</td>
            <td>${admin.phone}</td>
            <td class="${statusClass}">${statusText}</td>
            <td>${admin.created_at}</td>
            <td>
                <button class="btn" style="background:#3498db;padding:6px 12px;font-size:12px;margin-right:5px;" onclick='editAdmin(${JSON.stringify(admin)})'>Edit</button>
                <button class="delete-btn" onclick="deleteAdmin('${admin.admin_id}')">Delete</button>
            </td>`;
        tbody.appendChild(row);
    });
}

// Delete admin
async function deleteAdmin(adminId){
    if(!confirm('Are you sure you want to delete this admin?')) return;
    const { error } = await db.from('admin').delete().eq('admin_id', adminId);
    if(error){ showMessage('Error deleting admin', 'error'); }
    else { showMessage('Admin deleted', 'success'); loadAdmins(); }
}

function showMessage(msg, type){
    const d = document.getElementById('message');
    d.textContent = msg;
    d.className = 'message ' + type;
    d.style.display = 'block';
    setTimeout(() => d.style.display = 'none', 3000);
}

function editAdmin(admin){
    document.getElementById('edit_admin_id').value = admin.admin_id;
    document.getElementById('edit_name').value     = admin.name;
    document.getElementById('edit_email').value    = admin.email;
    document.getElementById('edit_phone').value    = admin.phone;
    document.getElementById('edit_password').value = '';
    document.getElementById('editModal').style.display = 'block';
}

function closeEditModal(){ document.getElementById('editModal').style.display = 'none'; }

// Update admin
document.getElementById('editAdminForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const admin_id = document.getElementById('edit_admin_id').value;
    const name     = document.getElementById('edit_name').value.trim();
    const email    = document.getElementById('edit_email').value.trim();
    const phone    = document.getElementById('edit_phone').value.trim();
    const password = document.getElementById('edit_password').value;

    const updates = { name, email, phone };
    if(password) updates.password = await hashPassword(password);

    const { error } = await db.from('admin').update(updates).eq('admin_id', admin_id);
    if(error){ showMessage('Error updating admin', 'error'); }
    else { showMessage('Admin updated successfully', 'success'); closeEditModal(); loadAdmins(); }
});

</script>

</body>
</html>
