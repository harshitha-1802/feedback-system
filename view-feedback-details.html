<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Feedback Details</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
width:90%;
margin:auto;
margin-top:30px;
padding-bottom:50px;
}

.back-btn{
margin-bottom:15px;
}

.back-btn button{
background:#6c757d;
padding:10px 20px;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.faculty-header{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.faculty-header h2{
margin:0 0 10px 0;
color:#007bff;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
gap:20px;
margin-bottom:25px;
}

.stat-card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.stat-value{
font-size:32px;
font-weight:bold;
color:#007bff;
}

.stat-label{
color:#666;
margin-top:5px;
}

.chart-container{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.feedback-list{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:25px;
}

.feedback-item{
border:1px solid #ddd;
padding:15px;
margin-bottom:15px;
border-radius:5px;
background:#f8f9fa;
}

.feedback-item h4{
margin:0 0 10px 0;
color:#007bff;
}

.rating-row{
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:10px;
margin:10px 0;
}

.rating-item{
background:white;
padding:10px;
border-radius:5px;
text-align:center;
}

.rating-label{
font-size:12px;
color:#666;
}

.rating-value{
font-size:18px;
font-weight:bold;
color:#28a745;
}

.comment-box{
background:white;
padding:10px;
border-radius:5px;
margin-top:10px;
font-style:italic;
color:#555;
}

.no-feedback{
text-align:center;
padding:40px;
background:#fff3cd;
border:2px solid #ffc107;
border-radius:8px;
}

.loading{
text-align:center;
padding:40px;
font-size:18px;
color:#666;
}

</style>

</head>

<body>

<div class="container">

<div class="back-btn">
<button onclick="goBack()">← Back to All Faculty</button>
</div>

<div id="loadingMessage" class="loading">
Loading feedback details...
</div>

<div id="contentArea" style="display:none;">

<div class="faculty-header">
<h2 id="facultyName">Faculty Name</h2>
<p id="facultyDetails"></p>
</div>

<div id="noFeedbackMessage" class="no-feedback" style="display:none;">
<h3>📭 No Feedback Received</h3>
<p>This faculty member hasn't received any feedback from students yet.</p>
</div>

<div id="feedbackContent" style="display:none;">

<div class="stats-grid">
<div class="stat-card">
<div class="stat-value" id="totalFeedback">0</div>
<div class="stat-label">Total Feedback</div>
</div>
<div class="stat-card">
<div class="stat-value" id="avgTeaching">0.0</div>
<div class="stat-label">Teaching Quality</div>
</div>
<div class="stat-card">
<div class="stat-value" id="avgCommunication">0.0</div>
<div class="stat-label">Communication</div>
</div>
<div class="stat-card">
<div class="stat-value" id="avgKnowledge">0.0</div>
<div class="stat-label">Subject Knowledge</div>
</div>
<div class="stat-card">
<div class="stat-value" id="avgPunctuality">0.0</div>
<div class="stat-label">Punctuality</div>
</div>
<div class="stat-card">
<div class="stat-value" id="avgOverall">0.0</div>
<div class="stat-label">Overall Average</div>
</div>
</div>

<div class="chart-container">
<h3>Rating Analysis</h3>
<canvas id="ratingChart"></canvas>
</div>

<div class="feedback-list">
<h3>Individual Feedback Details</h3>
<div id="feedbackItems"></div>
</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
function goBack(){ window.location.href="view-feedback.html"; }
const ratingMap = {'Excellent':4,'Good':3,'Average':2,'Poor':1};

async function loadFeedbackDetails() {
    const facultyId = new URLSearchParams(window.location.search).get('faculty_id');
    if(!facultyId){ alert('Faculty ID not provided'); goBack(); return; }

    const { data: f } = await db.from('faculty').select('faculty_id, name, email, departments(dept_name)').eq('faculty_id', facultyId).single();
    document.getElementById('loadingMessage').style.display='none';
    document.getElementById('contentArea').style.display='block';
    document.getElementById('facultyName').textContent = f?.name||'';
    document.getElementById('facultyDetails').innerHTML = `<strong>Faculty ID:</strong> ${f?.faculty_id} | <strong>Department:</strong> ${f?.departments?.dept_name||''} | <strong>Email:</strong> ${f?.email}`;

    const { data: feedbacks } = await db.from('feedback').select('*, students(name, student_id), courses(course_name, course_code)').eq('faculty_id', facultyId);

    if(!feedbacks||feedbacks.length===0){ document.getElementById('noFeedbackMessage').style.display='block'; return; }
    document.getElementById('feedbackContent').style.display='block';

    const n = feedbacks.length;
    const avg = k => (feedbacks.reduce((s,f)=>s+(ratingMap[f[k]]||0),0)/n).toFixed(2);
    const avgs = { t: avg('teaching_quality'), c: avg('communication'), k: avg('subject_knowledge'), p: avg('punctuality') };
    const overall = ((+avgs.t + +avgs.c + +avgs.k + +avgs.p)/4).toFixed(2);

    document.getElementById('totalFeedback').textContent=n;
    document.getElementById('avgTeaching').textContent=avgs.t;
    document.getElementById('avgCommunication').textContent=avgs.c;
    document.getElementById('avgKnowledge').textContent=avgs.k;
    document.getElementById('avgPunctuality').textContent=avgs.p;
    document.getElementById('avgOverall').textContent=overall;

    new Chart(document.getElementById('ratingChart'),{type:'bar',data:{labels:['Teaching','Communication','Knowledge','Punctuality'],datasets:[{label:'Avg Rating (out of 4)',data:[avgs.t,avgs.c,avgs.k,avgs.p],backgroundColor:['#28a745','#007bff','#ffc107','#dc3545']}]},options:{responsive:true,scales:{y:{beginAtZero:true,max:4}}}});

    document.getElementById('feedbackItems').innerHTML = feedbacks.map((fb,i)=>`
        <div class="feedback-item">
            <h4>Feedback #${i+1} - ${fb.courses?.course_name||''} (${fb.courses?.course_code||''})</h4>
            <p><strong>Student:</strong> ${fb.students?.name||''} (${fb.students?.student_id||''})</p>
            <p><strong>Semester:</strong> ${fb.semester} | <strong>Submitted:</strong> ${new Date(fb.submitted_at).toLocaleDateString()}</p>
            <div class="rating-row">
                <div class="rating-item"><div class="rating-label">Teaching</div><div class="rating-value">${fb.teaching_quality}</div></div>
                <div class="rating-item"><div class="rating-label">Communication</div><div class="rating-value">${fb.communication}</div></div>
                <div class="rating-item"><div class="rating-label">Knowledge</div><div class="rating-value">${fb.subject_knowledge}</div></div>
                <div class="rating-item"><div class="rating-label">Punctuality</div><div class="rating-value">${fb.punctuality}</div></div>
            </div>
            ${fb.comments?`<div class="comment-box"><strong>Comment:</strong> ${fb.comments}</div>`:''}
        </div>`).join('');
}
        
        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('contentArea').style.display = 'block';
        
        if (result.success) {
            displayFacultyInfo(result.faculty_info);
            
            if (result.feedbacks.length === 0) {
                document.getElementById('noFeedbackMessage').style.display = 'block';
                document.getElementById('feedbackContent').style.display = 'none';
            } else {
                document.getElementById('noFeedbackMessage').style.display = 'none';
                document.getElementById('feedbackContent').style.display = 'block';
                displayFeedbackData(result.feedbacks, result.averages);
            }
        } else {
            alert('Failed to load feedback: ' + result.message);
            goBack();
        }
    } catch (error) {
        alert('Error loading feedback details');
        goBack();
    }
}

function displayFacultyInfo(info) {
    document.getElementById('facultyName').textContent = info.name;
    document.getElementById('facultyDetails').innerHTML = `
        <strong>Faculty ID:</strong> ${info.faculty_id} | 
        <strong>Department:</strong> ${info.dept_name} | 
        <strong>Email:</strong> ${info.email}
    `;
}

function displayFeedbackData(feedbacks, averages) {
    // Display statistics
    document.getElementById('totalFeedback').textContent = averages.total_feedback;
    document.getElementById('avgTeaching').textContent = parseFloat(averages.avg_teaching || 0).toFixed(2);
    document.getElementById('avgCommunication').textContent = parseFloat(averages.avg_communication || 0).toFixed(2);
    document.getElementById('avgKnowledge').textContent = parseFloat(averages.avg_knowledge || 0).toFixed(2);
    document.getElementById('avgPunctuality').textContent = parseFloat(averages.avg_punctuality || 0).toFixed(2);
    
    const avgOverall = ((parseFloat(averages.avg_teaching || 0) + 
                        parseFloat(averages.avg_communication || 0) + 
                        parseFloat(averages.avg_knowledge || 0) + 
                        parseFloat(averages.avg_punctuality || 0)) / 4).toFixed(2);
    document.getElementById('avgOverall').textContent = avgOverall;
    
    // Display chart
    displayChart(averages);
    
    // Display individual feedback
    const feedbackItems = document.getElementById('feedbackItems');
    feedbackItems.innerHTML = '';
    
    feedbacks.forEach((feedback, index) => {
        const item = document.createElement('div');
        item.className = 'feedback-item';
        
        item.innerHTML = `
            <h4>Feedback #${index + 1} - ${feedback.course_name} (${feedback.course_code})</h4>
            <p><strong>Student:</strong> ${feedback.student_name} (${feedback.student_id})</p>
            <p><strong>Semester:</strong> ${feedback.semester} | <strong>Submitted:</strong> ${new Date(feedback.submitted_at).toLocaleDateString()}</p>
            
            <div class="rating-row">
                <div class="rating-item">
                    <div class="rating-label">Teaching Quality</div>
                    <div class="rating-value">${feedback.teaching_quality}</div>
                </div>
                <div class="rating-item">
                    <div class="rating-label">Communication</div>
                    <div class="rating-value">${feedback.communication}</div>
                </div>
                <div class="rating-item">
                    <div class="rating-label">Subject Knowledge</div>
                    <div class="rating-value">${feedback.subject_knowledge}</div>
                </div>
                <div class="rating-item">
                    <div class="rating-label">Punctuality</div>
                    <div class="rating-value">${feedback.punctuality}</div>
                </div>
            </div>
            
            ${feedback.comments ? `
                <div class="comment-box">
                    <strong>Comment:</strong> ${feedback.comments}
                </div>
            ` : ''}
        `;
        
        feedbackItems.appendChild(item);
    });
}

function displayChart(averages) {
    const ctx = document.getElementById('ratingChart');
    
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Teaching Quality', 'Communication', 'Subject Knowledge', 'Punctuality'],
            datasets: [{
                label: 'Average Rating (out of 4)',
                data: [
                    parseFloat(averages.avg_teaching || 0).toFixed(2),
                    parseFloat(averages.avg_communication || 0).toFixed(2),
                    parseFloat(averages.avg_knowledge || 0).toFixed(2),
                    parseFloat(averages.avg_punctuality || 0).toFixed(2)
                ],
                backgroundColor: [
                    '#28a745',
                    '#007bff',
                    '#ffc107',
                    '#dc3545'
                ]
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 4
                }
            }
        }
    });
}

// Load data when page loads
window.onload = loadFeedbackDetails;
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

</body>
</html>
