<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Student</title>
<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.navbar{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
position:relative;
}

.back-btn{
position:absolute;
left:20px;
top:12px;
background:#3498db;
color:white;
padding:8px 15px;
border-radius:5px;
text-decoration:none;
font-size:14px;
}

.container{
padding:40px;
max-width:600px;
margin:auto;
}

.form-container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
color:#333;
}

input, select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:5px;
font-size:16px;
box-sizing:border-box;
}

.btn{
background:#3498db;
color:white;
padding:12px 30px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
margin-right:10px;
}

.btn:hover{
background:#2980b9;
}

.btn-danger{
background:#e74c3c;
}

.btn-danger:hover{
background:#c0392b;
}

.loading{
text-align:center;
padding:50px;
color:#666;
}

.error{
color:#e74c3c;
margin-top:10px;
}

.success{
color:#27ae60;
margin-top:10px;
}
</style>
</head>
<body>

<div class="navbar">
Edit Student
<a href="manage-students.html" class="back-btn">← Back</a>
</div>

<div class="container">
<div class="form-container" id="formContainer">
<div class="loading">Loading student details...</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
let studentId='';
document.addEventListener('DOMContentLoaded', async function() {
    studentId = new URLSearchParams(window.location.search).get('id');
    if(!studentId){ document.getElementById('formContainer').innerHTML='<div class="error">No student ID provided</div>'; return; }
    const { data, error } = await db.from('students').select('*').eq('student_id', studentId).single();
    if(error||!data){ document.getElementById('formContainer').innerHTML='<div class="error">Student not found</div>'; return; }
    displayEditForm(data);
});

function displayEditForm(s) {
    const opts = (n,sel) => [1,2,3,4,5,6,7,8].map(i=>`<option value="${i}" ${s[n]==i?'selected':''}>${i}</option>`).join('');
    const deptOpts = [[1,'Computer Science and Engineering'],[2,'Information Technology'],[3,'Electronics and Communication Engineering'],[4,'Electrical and Electronics Engineering']].map(([v,l])=>`<option value="${v}" ${s.dept_id==v?'selected':''}>${l}</option>`).join('');
    document.getElementById('formContainer').innerHTML = `
        <h2>Edit Student: ${s.name}</h2>
        <form id="editForm">
            <div class="form-group"><label>Student ID</label><input type="text" value="${s.student_id}" readonly style="background:#f8f9fa;"></div>
            <div class="form-group"><label>Name *</label><input type="text" id="name" value="${s.name}" required></div>
            <div class="form-group"><label>Email *</label><input type="email" id="email" value="${s.email}" required></div>
            <div class="form-group"><label>Phone *</label><input type="text" id="phone" value="${s.phone}" required></div>
            <div class="form-group"><label>Department *</label><select id="department" required>${deptOpts}</select></div>
            <div class="form-group"><label>Semester *</label><select id="semester" required>${opts('semester')}</select></div>
            <div class="form-group"><label>Status *</label><select id="status" required><option value="1" ${s.is_active?'selected':''}>Active</option><option value="0" ${!s.is_active?'selected':''}>Inactive</option></select></div>
            <button type="submit" class="btn">Update Student</button>
            <button type="button" class="btn btn-danger" onclick="history.back()">Cancel</button>
            <div id="message"></div>
        </form>`;
    document.getElementById('editForm').addEventListener('submit', updateStudent);
}

async function updateStudent(e) {
    e.preventDefault();
    const { error } = await db.from('students').update({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        dept_id: parseInt(document.getElementById('department').value),
        semester: parseInt(document.getElementById('semester').value),
        is_active: document.getElementById('status').value === '1'
    }).eq('student_id', studentId);
    const msg = document.getElementById('message');
    if(error){ msg.innerHTML='<div class="error">Error: '+error.message+'</div>'; }
    else { msg.innerHTML='<div class="success">Student updated successfully!</div>'; setTimeout(()=>window.location.href='manage-students.html',1500); }
}

</body>
</html>
