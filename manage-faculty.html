<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Faculty</title>
<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.navbar{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
position:relative;
}

.back-btn{
position:absolute;
left:20px;
top:12px;
background:#3498db;
color:white;
padding:8px 15px;
border-radius:5px;
text-decoration:none;
font-size:14px;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.search-box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.search-box input{
width:300px;
padding:10px;
border:1px solid #ddd;
border-radius:5px;
margin-right:10px;
}

.search-box button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.faculty-table{
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#34495e;
color:white;
padding:15px;
text-align:left;
}

td{
padding:12px 15px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f8f9fa;
}

.btn{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:5px;
font-size:12px;
}

.btn-edit{
background:#f39c12;
color:white;
}

.btn-delete{
background:#e74c3c;
color:white;
}

.btn-edit:hover{
background:#e67e22;
}

.btn-delete:hover{
background:#c0392b;
}

.status-active{
color:#27ae60;
font-weight:bold;
}

.status-inactive{
color:#e74c3c;
font-weight:bold;
}

.loading{
text-align:center;
padding:50px;
color:#666;
}
</style>
</head>
<body>

<div class="navbar">
Manage Faculty
<a href="admin-dashboard.html" class="back-btn">← Back</a>
</div>

<div class="container">
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search by Faculty ID, Name, or Email...">
<button onclick="searchFaculty()">Search</button>
<button onclick="loadAllFaculty()" style="background:#27ae60;">Show All</button>
</div>

<div class="faculty-table">
<table>
<thead>
<tr>
<th>Faculty ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Department</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="facultyTableBody">
<tr>
<td colspan="7" class="loading">Loading faculty...</td>
</tr>
</tbody>
</table>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
let allFaculty = [];
document.addEventListener('DOMContentLoaded', loadAllFaculty);

async function loadAllFaculty() {
    const { data, error } = await db.from('faculty').select('faculty_id, name, email, phone, is_active, departments(dept_name)').order('name');
    if(error){ document.getElementById('facultyTableBody').innerHTML='<tr><td colspan="7" style="text-align:center;color:red;">Error: '+error.message+'</td></tr>'; return; }
    allFaculty = data;
    displayFaculty(data);
}

function displayFaculty(faculty) {
    const tbody = document.getElementById('facultyTableBody');
    if(!faculty||faculty.length===0){ tbody.innerHTML='<tr><td colspan="7" style="text-align:center;">No faculty found</td></tr>'; return; }
    tbody.innerHTML = faculty.map(m => `
        <tr>
            <td>${m.faculty_id}</td>
            <td>${m.name}</td>
            <td>${m.email}</td>
            <td>${m.phone}</td>
            <td>${m.departments?.dept_name||''}</td>
            <td><span class="status-${m.is_active?'active':'inactive'}">${m.is_active?'Active':'Inactive'}</span></td>
            <td>
                <button class="btn btn-edit" onclick="editFaculty('${m.faculty_id}')">Edit</button>
                <button class="btn btn-delete" onclick="deleteFaculty('${m.faculty_id}','${m.name}')">Delete</button>
            </td>
        </tr>`).join('');
}

function searchFaculty() {
    const term = document.getElementById('searchInput').value.trim().toLowerCase();
    if(!term){ displayFaculty(allFaculty); return; }
    displayFaculty(allFaculty.filter(m => m.faculty_id.toLowerCase().includes(term)||m.name.toLowerCase().includes(term)||m.email.toLowerCase().includes(term)));
}

function editFaculty(id){ window.location.href=`edit-faculty.html?id=${id}`; }

async function deleteFaculty(id, name) {
    if(!confirm(`Delete faculty "${name}" (${id})? This cannot be undone.`)) return;
    const { error } = await db.from('faculty').delete().eq('faculty_id', id);
    if(error){ alert('Error: '+error.message); } else { alert('Faculty deleted'); loadAllFaculty(); }
}

document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key==='Enter') searchFaculty(); });
</script>

</body>
</html>
