<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Forgot Password</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.box{
width:350px;
background:white;
padding:30px;
margin:120px auto;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid gray;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#218838;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.message{
margin-top:10px;
font-weight:bold;
}

.error{
color:red;
}

.success{
color:green;
}

.info{
font-size:14px;
color:#666;
margin:10px 0;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Forgot Password</h2>

<p class="info">Enter your Admin ID and Email (@bvrit.ac.in) to receive OTP</p>

<form id="forgotForm">
<input type="text" id="admin_id" placeholder="Admin ID" required>

<input type="email" id="email" placeholder="Email Address (@bvrit.ac.in)" required pattern=".*@bvrit\.ac\.in$">

<button type="submit" id="submitBtn">Send OTP to Email</button>
</form>

<div id="message" class="message"></div>

<br>
<a href="admin-login.html">Back to Login</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="supabase.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const user_id = document.getElementById('admin_id').value.trim();
    const email   = document.getElementById('email').value.trim();
    const messageDiv = document.getElementById('message');
    const submitBtn  = document.getElementById('submitBtn');
    submitBtn.disabled=true; submitBtn.textContent='Sending...';

    const { data, error: fetchError } = await db.from('admin').select('admin_id').eq('admin_id', user_id).eq('email', email).single();
    if(!data){ messageDiv.className='message error'; messageDiv.textContent='❌ Admin ID and Email do not match. Error: '+(fetchError?.message||'not found'); submitBtn.disabled=false; submitBtn.textContent='Send OTP to Email'; return; }

    const otp = Math.floor(100000+Math.random()*900000).toString();
    await db.from('password_reset_tokens').insert([{user_id, user_type:'admin', token:otp, expires_at:new Date(Date.now()+10*60*1000).toISOString()}]);
    try { await sendOTPEmail(email, otp); } catch(e) { console.error('Email error:', e); }
    messageDiv.className='message success';
    messageDiv.textContent='✅ OTP sent to your email';
    sessionStorage.setItem('reset_user_id', user_id);
    sessionStorage.setItem('reset_user_type', 'admin');
    setTimeout(()=>window.location.href='admin_reset_password.html', 2000);
});

</body>
</html>
