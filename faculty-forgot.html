<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Faculty Forgot Password</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:380px;
margin:120px auto;
background:white;
padding:30px;
text-align:center;
border-radius:8px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
width:90%;
padding:12px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.message{
margin-top:10px;
font-weight:bold;
}

.error{
color:red;
}

.success{
color:green;
}

.info{
font-size:14px;
color:#666;
margin:10px 0;
}

</style>

</head>

<body>

<div class="container">

<h2>Faculty Forgot Password</h2>

<p class="info">Enter your Faculty ID and Email (@bvrit.ac.in) to receive OTP</p>

<form id="forgotForm">
<input type="text" id="faculty_id" placeholder="Enter Faculty ID" required>

<input type="email" id="email" placeholder="Email Address (@bvrit.ac.in)" required pattern=".*@bvrit\.ac\.in$">

<button type="submit" id="submitBtn">Send OTP to Email</button>
</form>

<div id="message" class="message"></div>

<br>
<a href="faculty-login.html">Back to Login</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="supabase.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const user_id = document.getElementById('faculty_id').value.trim();
    const email   = document.getElementById('email').value.trim();
    const messageDiv = document.getElementById('message');
    const submitBtn  = document.getElementById('submitBtn');
    submitBtn.disabled=true; submitBtn.textContent='Sending...';
    const { data, error: fetchError } = await db.from('faculty').select('faculty_id').eq('faculty_id', user_id).eq('email', email).single();
    if(!data){ messageDiv.className='message error'; messageDiv.textContent='❌ Faculty ID and Email do not match. Error: '+(fetchError?.message||'not found'); submitBtn.disabled=false; submitBtn.textContent='Send OTP to Email'; return; }
    const otp = Math.floor(100000+Math.random()*900000).toString();
    await db.from('password_reset_tokens').insert([{user_id, user_type:'faculty', token:otp, expires_at:new Date(Date.now()+10*60*1000).toISOString()}]);
    try { await sendOTPEmail(email, otp); } catch(e) { console.error('Email error:', e); }
    messageDiv.className='message success';
    messageDiv.textContent='✅ OTP sent to your email';
    sessionStorage.setItem('reset_user_id', user_id);
    sessionStorage.setItem('reset_user_type', 'faculty');
    setTimeout(()=>window.location.href='faculty-verify.html', 2000);
});

</body>
</html>
