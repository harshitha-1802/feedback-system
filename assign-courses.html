<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assign Courses to Faculty</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding-bottom:50px;
}

.navbar{
background:#e74c3c;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
width:90%;
max-width:800px;
margin:40px auto;
}

.assign-section{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.assignments-section{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid gray;
box-sizing:border-box;
}

button{
margin-top:15px;
padding:10px 20px;
background:#e74c3c;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#c0392b;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.back-btn{
background:#6c757d;
}

.back-btn:hover{
background:#5a6268;
}

.delete-btn{
background:#dc3545;
padding:5px 10px;
font-size:14px;
margin:0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#e74c3c;
color:white;
}

tr:hover{
background:#f1f1f1;
}

.message{
margin-top:10px;
padding:10px;
border-radius:5px;
font-weight:bold;
}

.success{
background:#d4edda;
color:#155724;
}

.error{
background:#f8d7da;
color:#721c24;
}

.loading{
text-align:center;
padding:20px;
color:#666;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid gray;
box-sizing:border-box;
}

</style>

</head>

<body>

<div class="navbar">
Assign Courses to Faculty
</div>

<div class="container">

<button class="back-btn" onclick="goBack()">← Back to Dashboard</button>

<!-- Assign Course Section -->
<div class="assign-section">
<h3>Assign Course to Faculty</h3>

<form id="assignForm">

<label>Select Faculty</label>
<select id="faculty_id" required>
<option value="">Loading faculty...</option>
</select>

<label>Select Course/Subject</label>
<select id="course_id" required>
<option value="">Loading courses...</option>
</select>

<label>Semester</label>
<select id="semester" required>
<option value="">Select Semester</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
</select>

<label>Academic Year</label>
<input type="text" id="academic_year" placeholder="e.g., 2024-25" value="2024-25" required>

<button type="submit" id="assignBtn">Assign Course</button>
</form>

<div id="assignMessage"></div>
</div>

<!-- View Assignments Section -->
<div class="assignments-section">
<h3>Current Course Assignments</h3>

<div id="loadingMessage" class="loading">Loading assignments...</div>

<div id="assignmentsTable" style="display:none;">
<table>
<thead>
<tr>
<th>Faculty</th>
<th>Course</th>
<th>Semester</th>
<th>Academic Year</th>
<th>Action</th>
</tr>
</thead>
<tbody id="assignmentsBody"></tbody>
</table>
</div>

<div id="noAssignmentsMessage" style="display:none;text-align:center;padding:40px;color:#666;">
<p>No course assignments yet. Assign courses to faculty above!</p>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
function goBack(){ window.location.href="admin-dashboard.html"; }
window.onload = function(){ loadFaculty(); loadCourses(); loadAssignments(); };

async function loadFaculty() {
    const { data } = await db.from('faculty').select('faculty_id, name, departments(dept_name)').order('name');
    const select = document.getElementById('faculty_id');
    select.innerHTML = '<option value="">Select Faculty</option>';
    (data||[]).forEach(f => { const o=document.createElement('option'); o.value=f.faculty_id; o.textContent=`${f.name} (${f.faculty_id}) - ${f.departments?.dept_name||''}`; select.appendChild(o); });
}

async function loadCourses() {
    const { data } = await db.from('courses').select('course_id, course_code, course_name, semester, departments(dept_code)').order('course_code');
    const select = document.getElementById('course_id');
    select.innerHTML = '<option value="">Select Course</option>';
    (data||[]).forEach(c => { const o=document.createElement('option'); o.value=c.course_id; o.textContent=`${c.course_code} - ${c.course_name} (${c.departments?.dept_code||''}, Sem ${c.semester})`; select.appendChild(o); });
}

document.getElementById('assignForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const assignBtn = document.getElementById('assignBtn');
    const messageDiv = document.getElementById('assignMessage');
    assignBtn.disabled=true; assignBtn.textContent='Assigning...';

    const { error } = await db.from('faculty_courses').insert([{
        faculty_id: document.getElementById('faculty_id').value,
        course_id: parseInt(document.getElementById('course_id').value),
        semester: parseInt(document.getElementById('semester').value),
        academic_year: document.getElementById('academic_year').value
    }]);

    if(error){ messageDiv.className='message error'; messageDiv.textContent='❌ '+(error.message.includes('duplicate')?'Already assigned':error.message); }
    else { messageDiv.className='message success'; messageDiv.textContent='✅ Course assigned successfully!'; document.getElementById('assignForm').reset(); loadAssignments(); }
    assignBtn.disabled=false; assignBtn.textContent='Assign Course';
});

async function loadAssignments() {
    const { data } = await db.from('faculty_courses').select('assignment_id, semester, academic_year, faculty(faculty_id, name), courses(course_code, course_name)').order('assignment_id', {ascending:false});
    document.getElementById('loadingMessage').style.display='none';
    if(!data||data.length===0){ document.getElementById('noAssignmentsMessage').style.display='block'; document.getElementById('assignmentsTable').style.display='none'; return; }
    document.getElementById('noAssignmentsMessage').style.display='none';
    document.getElementById('assignmentsTable').style.display='block';
    document.getElementById('assignmentsBody').innerHTML = data.map(a => `
        <tr>
            <td>${a.faculty?.name||''} (${a.faculty?.faculty_id||''})</td>
            <td>${a.courses?.course_code||''} - ${a.courses?.course_name||''}</td>
            <td>${a.semester}</td>
            <td>${a.academic_year}</td>
            <td><button class="delete-btn" onclick="deleteAssignment(${a.assignment_id},'${a.faculty?.name||''}','${a.courses?.course_name||''}')">Remove</button></td>
        </tr>`).join('');
}

async function deleteAssignment(id, facultyName, courseName) {
    if(!confirm(`Remove "${courseName}" from ${facultyName}?`)) return;
    const { error } = await db.from('faculty_courses').delete().eq('assignment_id', id);
    if(error){ alert('❌ '+error.message); } else { alert('✅ Assignment removed'); loadAssignments(); }
}
</script>

</body>
</html>
