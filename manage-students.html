<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Students</title>
<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.navbar{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
position:relative;
}

.back-btn{
position:absolute;
left:20px;
top:12px;
background:#3498db;
color:white;
padding:8px 15px;
border-radius:5px;
text-decoration:none;
font-size:14px;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.search-box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.search-box input{
width:300px;
padding:10px;
border:1px solid #ddd;
border-radius:5px;
margin-right:10px;
}

.search-box button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.students-table{
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#34495e;
color:white;
padding:15px;
text-align:left;
}

td{
padding:12px 15px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f8f9fa;
}

.btn{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:5px;
font-size:12px;
}

.btn-edit{
background:#f39c12;
color:white;
}

.btn-delete{
background:#e74c3c;
color:white;
}

.btn-edit:hover{
background:#e67e22;
}

.btn-delete:hover{
background:#c0392b;
}

.status-active{
color:#27ae60;
font-weight:bold;
}

.status-inactive{
color:#e74c3c;
font-weight:bold;
}

.loading{
text-align:center;
padding:50px;
color:#666;
}
</style>
</head>
<body>

<div class="navbar">
Manage Students
<a href="admin-dashboard.html" class="back-btn">← Back</a>
</div>

<div class="container">
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search by Student ID, Name, or Email...">
<button onclick="searchStudents()">Search</button>
<button onclick="loadAllStudents()" style="background:#27ae60;">Show All</button>
</div>

<div class="students-table">
<table>
<thead>
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Department</th>
<th>Semester</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="studentsTableBody">
<tr>
<td colspan="8" class="loading">Loading students...</td>
</tr>
</tbody>
</table>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', loadAllStudents);

async function loadAllStudents() {
    const { data, error } = await db.from('students').select('student_id, name, email, phone, semester, is_active, departments(dept_name)').order('name');
    if(error){ document.getElementById('studentsTableBody').innerHTML='<tr><td colspan="8" style="text-align:center;color:red;">Error: '+error.message+'</td></tr>'; return; }
    allStudents = data;
    displayStudents(data);
}

let allStudents = [];

function displayStudents(students) {
    const tbody = document.getElementById('studentsTableBody');
    if(!students||students.length===0){ tbody.innerHTML='<tr><td colspan="8" style="text-align:center;">No students found</td></tr>'; return; }
    tbody.innerHTML = students.map(s => `
        <tr>
            <td>${s.student_id}</td>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.phone}</td>
            <td>${s.departments?.dept_name||''}</td>
            <td>${s.semester}</td>
            <td><span class="status-${s.is_active?'active':'inactive'}">${s.is_active?'Active':'Inactive'}</span></td>
            <td>
                <button class="btn btn-edit" onclick="editStudent('${s.student_id}')">Edit</button>
                <button class="btn btn-delete" onclick="deleteStudent('${s.student_id}','${s.name}')">Delete</button>
            </td>
        </tr>`).join('');
}

function searchStudents() {
    const term = document.getElementById('searchInput').value.trim().toLowerCase();
    if(!term){ displayStudents(allStudents); return; }
    displayStudents(allStudents.filter(s => s.student_id.toLowerCase().includes(term)||s.name.toLowerCase().includes(term)||s.email.toLowerCase().includes(term)));
}

function editStudent(id){ window.location.href=`edit-student.html?id=${id}`; }

async function deleteStudent(id, name) {
    if(!confirm(`Delete student "${name}" (${id})? This cannot be undone.`)) return;
    const { error } = await db.from('students').delete().eq('student_id', id);
    if(error){ alert('Error: '+error.message); } else { alert('Student deleted'); loadAllStudents(); }
}

document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key==='Enter') searchStudents(); });
</script>

</body>
</html>
