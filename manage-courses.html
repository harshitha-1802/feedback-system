<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Courses</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding-bottom:50px;
}

.navbar{
background:#16a085;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
width:90%;
max-width:1200px;
margin:40px auto;
}

.add-section{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.courses-section{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid gray;
box-sizing:border-box;
}

button{
margin-top:15px;
padding:10px 20px;
background:#16a085;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#138d75;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.back-btn{
background:#6c757d;
}

.back-btn:hover{
background:#5a6268;
}

.delete-btn{
background:#dc3545;
padding:5px 10px;
font-size:14px;
margin:0;
}

.delete-btn:hover{
background:#c82333;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#16a085;
color:white;
}

tr:hover{
background:#f1f1f1;
}

.message{
margin-top:10px;
padding:10px;
border-radius:5px;
font-weight:bold;
}

.success{
background:#d4edda;
color:#155724;
}

.error{
background:#f8d7da;
color:#721c24;
}

.loading{
text-align:center;
padding:20px;
color:#666;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

@media (max-width:768px){
.form-grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="navbar">
Manage Subjects / Courses
</div>

<div class="container">

<button class="back-btn" onclick="goBack()">← Back to Dashboard</button>

<!-- Add Course Section -->
<div class="add-section">
<h3>Add New Subject</h3>

<form id="addCourseForm">
<div class="form-grid">
<div>
<label>Department</label>
<select id="department" required>
<option value="">Select Department</option>
<option value="CSE">CSE - Computer Science</option>
<option value="IT">IT - Information Technology</option>
<option value="ECE">ECE - Electronics & Communication</option>
<option value="EEE">EEE - Electrical & Electronics</option>
</select>
</div>

<div>
<label>Semester</label>
<select id="semester" required>
<option value="">Select Semester</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
</select>
</div>
</div>

<label>Subject Name</label>
<input type="text" id="course_name" placeholder="e.g., Database Management System" required>

<label>Subject Code</label>
<input type="text" id="course_code" placeholder="e.g., CS301" required>

<button type="submit" id="addBtn">Add Subject</button>
</form>

<div id="addMessage"></div>
</div>

<!-- View Courses Section -->
<div class="courses-section">
<h3>All Subjects</h3>

<div id="loadingMessage" class="loading">Loading subjects...</div>

<div id="coursesTable" style="display:none;">
<table>
<thead>
<tr>
<th>Subject Code</th>
<th>Subject Name</th>
<th>Department</th>
<th>Semester</th>
<th>Action</th>
</tr>
</thead>
<tbody id="coursesBody"></tbody>
</table>
</div>

<div id="noCoursesMessage" style="display:none;text-align:center;padding:40px;color:#666;">
<p>No subjects added yet. Add your first subject above!</p>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
function goBack(){ window.location.href="admin-dashboard.html"; }
window.onload = loadCourses;

document.getElementById('addCourseForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const addBtn = document.getElementById('addBtn');
    const messageDiv = document.getElementById('addMessage');
    addBtn.disabled=true; addBtn.textContent='Adding...';

    const deptCode   = document.getElementById('department').value;
    const course_name = document.getElementById('course_name').value.trim();
    const course_code = document.getElementById('course_code').value.trim();
    const semester   = parseInt(document.getElementById('semester').value);

    // Get dept_id from dept_code
    const { data: dept } = await db.from('departments').select('dept_id').eq('dept_code', deptCode).single();
    if(!dept){ messageDiv.className='message error'; messageDiv.textContent='❌ Department not found'; addBtn.disabled=false; addBtn.textContent='Add Subject'; return; }

    const { error } = await db.from('courses').insert([{ course_code, course_name, dept_id: dept.dept_id, semester }]);
    if(error){ messageDiv.className='message error'; messageDiv.textContent='❌ '+(error.message.includes('duplicate')?'Course code already exists':error.message); }
    else { messageDiv.className='message success'; messageDiv.textContent='✅ Subject added successfully!'; document.getElementById('addCourseForm').reset(); loadCourses(); }
    addBtn.disabled=false; addBtn.textContent='Add Subject';
});

async function loadCourses() {
    document.getElementById('loadingMessage').style.display='block';
    const { data, error } = await db.from('courses').select('course_id, course_code, course_name, semester, departments(dept_name, dept_code)').order('course_code');
    document.getElementById('loadingMessage').style.display='none';
    if(error||!data||data.length===0){ document.getElementById('noCoursesMessage').style.display='block'; document.getElementById('coursesTable').style.display='none'; return; }
    document.getElementById('noCoursesMessage').style.display='none';
    document.getElementById('coursesTable').style.display='block';
    displayCourses(data);
}

function displayCourses(courses) {
    document.getElementById('coursesBody').innerHTML = courses.map(c => `
        <tr>
            <td>${c.course_code}</td>
            <td>${c.course_name}</td>
            <td>${c.departments?.dept_name||''} (${c.departments?.dept_code||''})</td>
            <td>${c.semester}</td>
            <td><button class="delete-btn" onclick="deleteCourse(${c.course_id},'${c.course_name}')">Delete</button></td>
        </tr>`).join('');
}

async function deleteCourse(id, name) {
    if(!confirm(`Delete subject "${name}"? This will also delete related feedback!`)) return;
    const { error } = await db.from('courses').delete().eq('course_id', id);
    if(error){ alert('❌ '+error.message); } else { alert('✅ Subject deleted'); loadCourses(); }
}
</script>

</body>
</html>
