<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Reset Password</title>

<style>

body{
font-family:Arial;
background:#e8f0fe;
}

.reset-box{
width:350px;
background:white;
padding:30px;
margin:120px auto;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid gray;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.message{
margin-top:10px;
font-weight:bold;
}

.error{
color:red;
}

.success{
color:green;
}

.info{
font-size:12px;
color:#666;
margin:10px 0;
}

</style>

</head>

<body>

<div class="reset-box">

<h2>Reset Password</h2>

<p class="info">Enter OTP and set new password</p>

<form id="resetForm">
<input type="text" id="otp" placeholder="Enter OTP" maxlength="6" required>

<input type="password" id="new_password" placeholder="New Password" required>

<input type="password" id="confirm_password" placeholder="Confirm Password" required>

<button type="submit" id="submitBtn">Reset Password</button>
</form>

<div id="message" class="message"></div>

<br>
<a href="admin_forgot_password.html">Resend OTP</a>

</div>

<script>
if (!sessionStorage.getItem('reset_user_id')) {
    alert('Please start from forgot password page');
    window.location.href = 'admin_forgot_password.html';
}

document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const otp = document.getElementById('otp').value.trim();
    const new_password = document.getElementById('new_password').value;
    const confirm_password = document.getElementById('confirm_password').value;
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    
    if (otp.length !== 6) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'OTP must be 6 digits';
        return;
    }
    
    if (new_password !== confirm_password) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Passwords do not match';
        return;
    }
    
    const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[\W]).{6,}$/;
    if (!passwordRegex.test(new_password)) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Password must contain uppercase, lowercase, and special character (min 6 chars)';
        return;
    }
    
    submitBtn.disabled = true;
    submitBtn.textContent = 'Processing...';
    messageDiv.textContent = '';
    
    try {
        // First verify OTP
        const verifyData = new FormData();
        verifyData.append('user_id', sessionStorage.getItem('reset_user_id'));
        verifyData.append('user_type', sessionStorage.getItem('reset_user_type'));
        verifyData.append('otp', otp);
        
        const verifyResponse = await fetch('api/common/verify_otp.php', {
            method: 'POST',
            body: verifyData
        });
        
        const verifyResult = await verifyResponse.json();
        
        if (!verifyResult.success) {
            messageDiv.className = 'message error';
            messageDiv.textContent = '❌ ' + verifyResult.message;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Reset Password';
            return;
        }
        
        // OTP verified, now reset password
        const resetData = new FormData();
        resetData.append('token', verifyResult.token);
        resetData.append('new_password', new_password);
        
        const resetResponse = await fetch('api/common/reset_password.php', {
            method: 'POST',
            body: resetData
        });
        
        const resetResult = await resetResponse.json();
        
        if (resetResult.success) {
            messageDiv.className = 'message success';
            messageDiv.textContent = '✅ Password reset successfully!';
            
            sessionStorage.removeItem('reset_user_id');
            sessionStorage.removeItem('reset_user_type');
            sessionStorage.removeItem('reset_contact');
            sessionStorage.removeItem('reset_otp');
            
            setTimeout(() => {
                window.location.href = 'admin-login.html';
            }, 2000);
        } else {
            messageDiv.className = 'message error';
            messageDiv.textContent = '❌ ' + resetResult.message;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Reset Password';
        }
    } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '❌ Failed to reset password. Please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
    }
});
</script>

</body>
</html>
