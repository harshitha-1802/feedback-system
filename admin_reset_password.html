<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Reset Password</title>

<style>

body{
font-family:Arial;
background:#e8f0fe;
}

.reset-box{
width:350px;
background:white;
padding:30px;
margin:120px auto;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid gray;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.message{
margin-top:10px;
font-weight:bold;
}

.error{
color:red;
}

.success{
color:green;
}

.info{
font-size:12px;
color:#666;
margin:10px 0;
}

</style>

</head>

<body>

<div class="reset-box">

<h2>Reset Password</h2>

<p class="info">Enter OTP and set new password</p>

<form id="resetForm">
<input type="text" id="otp" placeholder="Enter OTP" maxlength="6" required>

<input type="password" id="new_password" placeholder="New Password" required>

<input type="password" id="confirm_password" placeholder="Confirm Password" required>

<button type="submit" id="submitBtn">Reset Password</button>
</form>

<div id="message" class="message"></div>

<br>
<a href="admin_forgot_password.html">Resend OTP</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
if(!sessionStorage.getItem('reset_user_id')){ alert('Please start from forgot password page'); window.location.href='admin_forgot_password.html'; }

document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const otp = document.getElementById('otp').value.trim();
    const newPass = document.getElementById('new_password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    if(otp.length!==6){ messageDiv.className='message error'; messageDiv.textContent='OTP must be 6 digits'; return; }
    if(newPass!==confirmPass){ messageDiv.className='message error'; messageDiv.textContent='Passwords do not match'; return; }
    if(!validatePassword(newPass)){ messageDiv.className='message error'; messageDiv.textContent='Password must contain uppercase, lowercase, and special character (min 6 chars)'; return; }

    submitBtn.disabled=true; submitBtn.textContent='Processing...';

    const now = new Date().toISOString();
    const { data } = await db.from('password_reset_tokens').select('user_id').eq('token',otp).eq('user_type','admin').gte('expires_at',now).single();
    if(!data){ messageDiv.className='message error'; messageDiv.textContent='❌ Invalid or expired OTP'; submitBtn.disabled=false; submitBtn.textContent='Reset Password'; return; }

    const hashed = await hashPassword(newPass);
    await db.from('admin').update({password:hashed}).eq('admin_id', sessionStorage.getItem('reset_user_id'));
    await db.from('password_reset_tokens').delete().eq('token',otp);

    messageDiv.className='message success'; messageDiv.textContent='✅ Password reset successfully!';
    sessionStorage.clear();
    setTimeout(()=>window.location.href='admin-login.html',2000);
});

</body>
</html>
