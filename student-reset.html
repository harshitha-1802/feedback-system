<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:350px;
margin:120px auto;
background:white;
padding:30px;
text-align:center;
border-radius:8px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
cursor:pointer;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.message{
margin-top:10px;
font-weight:bold;
}

.error{
color:red;
}

.success{
color:green;
}

.info{
font-size:12px;
color:#666;
margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>Reset Password</h2>

<p class="info">Password must contain uppercase, lowercase, and special character (min 6 chars)</p>

<form id="resetForm">
<input type="password" id="new_password" placeholder="New Password" required>

<input type="password" id="confirm_password" placeholder="Confirm Password" required>

<button type="submit" id="submitBtn">Reset Password</button>
</form>

<div id="message" class="message"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
if(!sessionStorage.getItem('reset_token')){ alert('Please verify OTP first'); window.location.href='student-forgot.html'; }
document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const newPass = document.getElementById('new_password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    if(newPass!==confirmPass){ messageDiv.className='message error'; messageDiv.textContent='Passwords do not match'; return; }
    if(!validatePassword(newPass)){ messageDiv.className='message error'; messageDiv.textContent='Password must contain uppercase, lowercase, and special character (min 6 chars)'; return; }
    submitBtn.disabled=true; submitBtn.textContent='Resetting...';
    const hashed = await hashPassword(newPass);
    await db.from('students').update({password:hashed}).eq('student_id', sessionStorage.getItem('reset_user_id'));
    await db.from('password_reset_tokens').delete().eq('token', sessionStorage.getItem('reset_token'));
    messageDiv.className='message success'; messageDiv.textContent='✅ Password reset successfully!';
    sessionStorage.clear();
    setTimeout(()=>window.location.href='student-login.html',2000);
});

</body>
</html>
