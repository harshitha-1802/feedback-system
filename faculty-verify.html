<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Verify OTP</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.container{
width:350px;
margin:120px auto;
background:white;
padding:30px;
text-align:center;
border-radius:8px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
width:90%;
padding:12px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.message{
margin-top:10px;
font-weight:bold;
}

.error{
color:red;
}

.success{
color:green;
}

.info{
font-size:14px;
color:#666;
margin:10px 0;
}

</style>

</head>

<body>

<div class="container">

<h2>Verify OTP</h2>

<p class="info">Enter the 6-digit OTP sent to your contact</p>

<form id="verifyForm">
<input type="text" id="otp" placeholder="Enter OTP" maxlength="6" required>

<button type="submit" id="submitBtn">Verify OTP</button>
</form>

<div id="message" class="message"></div>

<br>
<a href="faculty-forgot.html">Resend OTP</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
if(!sessionStorage.getItem('reset_user_id')){ alert('Please start from forgot password page'); window.location.href='faculty-forgot.html'; }
document.getElementById('verifyForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const otp = document.getElementById('otp').value.trim();
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    if(otp.length!==6){ messageDiv.className='message error'; messageDiv.textContent='OTP must be 6 digits'; return; }
    submitBtn.disabled=true; submitBtn.textContent='Verifying...';
    const now = new Date().toISOString();
    const { data } = await db.from('password_reset_tokens').select('user_id').eq('token',otp).eq('user_type','faculty').gte('expires_at',now).single();
    if(!data){ messageDiv.className='message error'; messageDiv.textContent='❌ Invalid or expired OTP'; submitBtn.disabled=false; submitBtn.textContent='Verify OTP'; return; }
    sessionStorage.setItem('reset_token', otp);
    messageDiv.className='message success'; messageDiv.textContent='✅ OTP Verified!';
    setTimeout(()=>window.location.href='faculty-reset.html',1000);
});
</script>

</body>
</html>
